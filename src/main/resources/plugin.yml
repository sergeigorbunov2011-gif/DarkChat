name: DarkChat
version: 1.0.0
main: me.darkmine.darkchat.DarkChat
api-version: 1.16

author: PhantomEdge

description: Advanced chat plugin for DarkMine

softdepend:
  - PlaceholderAPI
  - Vault
  - LuckPerms
  - Teams

commands:
  darkchat:
    description: Reload DarkChat
    usage: /darkchat reload
    permission: darkchat.reload

  msg:
    description: Send private message
    usage: /msg <player> <message>

  reply:
    aliases: [r]
    description: Reply to last message

  ignore:
    description: Ignore player

  socialspy:
    description: Toggle SocialSpy

permissions:
  darkchat.reload:
    default: op

  darkchat.socialspy:
    default: op
